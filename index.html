<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Spark — Motivational Quotes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --card: #15152b;
      --accent: #7c6fff;
      --accent2: #ff6fb0;
      --text: #f0eeff;
      --muted: #7a7a9d;
      --border: rgba(124,111,255,0.18);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Animated background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .orb1 { width: 420px; height: 420px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 320px; height: 320px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -7s; }
    .orb3 { width: 240px; height: 240px; background: #6feaff; top: 50%; left: 60%; animation-delay: -3.5s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    /* Header */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 36px;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(13,13,26,0.6);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Georgia', serif;
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      color: var(--accent);
      font-weight: bold;
    }
    .logo span { color: var(--accent2); }

    .header-actions { display: flex; gap: 12px; }

    .pill-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .pill-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pill-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Main content */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      padding: 120px 24px 80px;
      gap: 40px;
    }

    /* Category bar */
    .category-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .cat-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 30px;
      padding: 7px 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.22s;
      letter-spacing: 0.05em;
      font-family: inherit;
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--text); }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Quote card */
    .card-wrap {
      perspective: 1000px;
      width: 100%;
      max-width: 720px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 56px 44px;
      position: relative;
      transition: transform 0.5s cubic-bezier(.4,0,.2,1), opacity 0.4s;
    }
    .card.fade-out { opacity: 0; transform: translateY(18px) scale(0.97); }
    .card.fade-in  { opacity: 1; transform: translateY(0) scale(1); }

    .quote-mark {
      font-size: 7rem;
      line-height: 0.6;
      color: var(--accent);
      opacity: 0.22;
      font-family: Georgia, serif;
      position: absolute;
      top: 28px;
      left: 44px;
      user-select: none;
    }

    .quote-text {
      font-size: clamp(1.2rem, 2.8vw, 1.65rem);
      line-height: 1.65;
      font-style: italic;
      color: var(--text);
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .quote-meta {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .author-dot {
      width: 28px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .author-name {
      font-size: 0.95rem;
      font-style: normal;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .category-tag {
      margin-left: auto;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(124,111,255,0.1);
      border: 1px solid rgba(124,111,255,0.2);
      border-radius: 12px;
      padding: 4px 12px;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .icon-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      font-size: 1.1rem;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.liked { color: var(--accent2); border-color: var(--accent2); }

    .next-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50px;
      padding: 14px 40px;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(124,111,255,0.3);
    }
    .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,111,255,0.45); }
    .next-btn:active { transform: translateY(0); }

    /* Progress dots */
    .progress {
      display: flex;
      gap: 7px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    /* Counter */
    .counter {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 10px 26px;
      font-size: 0.85rem;
      color: var(--text);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Favorites panel */
    .panel-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .panel-overlay.open { opacity: 1; pointer-events: all; }

    .panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(420px, 100vw);
      background: var(--card);
      border-left: 1px solid var(--border);
      z-index: 60;
      padding: 80px 32px 32px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    }
    .panel.open { transform: translateX(0); }

    .panel h2 {
      font-size: 1.1rem;
      color: var(--text);
      margin-bottom: 24px;
      letter-spacing: 0.06em;
    }
    .fav-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 14px;
      font-size: 0.88rem;
      font-style: italic;
      color: var(--text);
      line-height: 1.55;
    }
    .fav-item small {
      display: block;
      margin-top: 8px;
      font-style: normal;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .empty-fav { color: var(--muted); font-size: 0.9rem; text-align: center; margin-top: 60px; }
    .close-panel {
      position: absolute;
      top: 28px; right: 28px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .close-panel:hover { border-color: var(--accent2); color: var(--accent2); }

    @media (max-width: 600px) {
      .card { padding: 40px 28px 32px; }
      .quote-mark { font-size: 5rem; top: 16px; left: 22px; }
    }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <header>
    <div class="logo">Daily<span>Spark</span></div>
    <div class="header-actions">
      <button class="pill-btn" id="autoplayBtn" onclick="toggleAutoplay()">Auto-play</button>
      <button class="pill-btn" onclick="openPanel()">&#9829; Favorites</button>
    </div>
  </header>

  <main>
    <div class="category-bar" id="catBar"></div>

    <div class="card-wrap">
      <div class="card fade-in" id="quoteCard">
        <div class="quote-mark">"</div>
        <p class="quote-text" id="quoteText"></p>
        <div class="quote-meta">
          <div class="author-dot"></div>
          <span class="author-name" id="authorName"></span>
          <span class="category-tag" id="catTag"></span>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="icon-btn" title="Previous" onclick="prevQuote()">&#8592;</button>
      <button class="icon-btn" title="Like" id="likeBtn" onclick="toggleLike()">&#9825;</button>
      <button class="next-btn" onclick="nextQuote()">Next Quote &rarr;</button>
      <button class="icon-btn" title="Copy" onclick="copyQuote()">&#128203;</button>
      <button class="icon-btn" title="Share" onclick="shareQuote()">&#8679;</button>
    </div>

    <div class="progress" id="progressDots"></div>
    <div class="counter" id="counter"></div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- Favorites Panel -->
  <div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
  <div class="panel" id="panel">
    <button class="close-panel" onclick="closePanel()">&#10005;</button>
    <h2>Saved Favorites</h2>
    <div id="favList"></div>
  </div>

  <script>
    const QUOTES = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs", cat: "Purpose" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius", cat: "Persistence" },
      { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt", cat: "Mindset" },
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill", cat: "Resilience" },
      { text: "You are never too old to set another goal or to dream a new dream.", author: "C.S. Lewis", cat: "Growth" },
      { text: "The secret of getting ahead is getting started.", author: "Mark Twain", cat: "Action" },
      { text: "Hard work beats talent when talent doesn't work hard.", author: "Tim Notke", cat: "Persistence" },
      { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein", cat: "Mindset" },
      { text: "Life is 10% what happens to you and 90% how you react to it.", author: "Charles R. Swindoll", cat: "Mindset" },
      { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb", cat: "Action" },
      { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson", cat: "Persistence" },
      { text: "With the new day comes new strength and new thoughts.", author: "Eleanor Roosevelt", cat: "Growth" },
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt", cat: "Purpose" },
      { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe", cat: "Action" },
      { text: "Courage is not the absence of fear, but the triumph over it.", author: "Nelson Mandela", cat: "Resilience" },
      { text: "Your limitation—it's only your imagination.", author: "Unknown", cat: "Mindset" },
      { text: "Push yourself, because no one else is going to do it for you.", author: "Unknown", cat: "Action" },
      { text: "Great things never come from comfort zones.", author: "Unknown", cat: "Growth" },
      { text: "Dream it. Wish it. Do it.", author: "Unknown", cat: "Action" },
      { text: "Success doesn't just find you. You have to go out and get it.", author: "Unknown", cat: "Purpose" },
      { text: "The harder you work for something, the greater you'll feel when you achieve it.", author: "Unknown", cat: "Persistence" },
      { text: "Don't stop when you're tired. Stop when you're done.", author: "Unknown", cat: "Persistence" },
      { text: "Wake up with determination. Go to bed with satisfaction.", author: "Unknown", cat: "Mindset" },
      { text: "Little things make big days.", author: "Unknown", cat: "Growth" },
      { text: "It's going to be hard, but hard does not mean impossible.", author: "Unknown", cat: "Resilience" },
    ];

    const CATEGORIES = ["All", ...new Set(QUOTES.map(q => q.cat))];

    let currentIndex = 0;
    let activeCategory = "All";
    let favorites = new Set();
    let autoplayTimer = null;
    let isAutoplaying = false;

    function filteredQuotes() {
      return activeCategory === "All" ? QUOTES : QUOTES.filter(q => q.cat === activeCategory);
    }

    function buildCategoryBar() {
      const bar = document.getElementById("catBar");
      bar.innerHTML = CATEGORIES.map(c =>
        `<button class="cat-btn ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`
      ).join("");
    }

    function buildProgressDots() {
      const list = filteredQuotes();
      const dots = document.getElementById("progressDots");
      const max = Math.min(list.length, 10);
      dots.innerHTML = Array.from({length: max}, (_, i) =>
        `<div class="dot ${i === currentIndex % max ? 'active' : ''}"></div>`
      ).join("");
    }

    function updateCounter() {
      const list = filteredQuotes();
      document.getElementById("counter").textContent = `${currentIndex + 1} of ${list.length}`;
    }

    function showQuote(index, direction = 1) {
      const list = filteredQuotes();
      if (!list.length) return;
      currentIndex = ((index % list.length) + list.length) % list.length;
      const q = list[currentIndex];

      const card = document.getElementById("quoteCard");
      card.classList.remove("fade-in");
      card.classList.add("fade-out");

      setTimeout(() => {
        document.getElementById("quoteText").textContent = q.text;
        document.getElementById("authorName").textContent = `— ${q.author}`;
        document.getElementById("catTag").textContent = q.cat;
        updateLikeBtn();
        buildProgressDots();
        updateCounter();
        card.classList.remove("fade-out");
        card.classList.add("fade-in");
      }, 280);
    }

    function nextQuote() { showQuote(currentIndex + 1, 1); }
    function prevQuote() { showQuote(currentIndex - 1, -1); }

    function setCategory(cat) {
      activeCategory = cat;
      currentIndex = 0;
      buildCategoryBar();
      showQuote(0);
    }

    function updateLikeBtn() {
      const list = filteredQuotes();
      const q = list[currentIndex];
      const key = q.text;
      const btn = document.getElementById("likeBtn");
      btn.classList.toggle("liked", favorites.has(key));
      btn.innerHTML = favorites.has(key) ? "&#9829;" : "&#9825;";
    }

    function toggleLike() {
      const list = filteredQuotes();
      const q = list[currentIndex];
      const key = q.text;
      if (favorites.has(key)) {
        favorites.delete(key);
        showToast("Removed from favorites");
      } else {
        favorites.add(key);
        showToast("Saved to favorites ♥");
      }
      updateLikeBtn();
    }

    function copyQuote() {
      const list = filteredQuotes();
      const q = list[currentIndex];
      const text = `"${q.text}" — ${q.author}`;
      navigator.clipboard.writeText(text).then(() => showToast("Copied to clipboard!")).catch(() => showToast("Copy failed"));
    }

    function shareQuote() {
      const list = filteredQuotes();
      const q = list[currentIndex];
      const text = `"${q.text}" — ${q.author}`;
      if (navigator.share) {
        navigator.share({ title: "Daily Spark", text });
      } else {
        copyQuote();
        showToast("Link copied — ready to share!");
      }
    }

    function toggleAutoplay() {
      isAutoplaying = !isAutoplaying;
      const btn = document.getElementById("autoplayBtn");
      if (isAutoplaying) {
        btn.classList.add("active");
        autoplayTimer = setInterval(nextQuote, 5000);
        showToast("Auto-play on — new quote every 5s");
      } else {
        btn.classList.remove("active");
        clearInterval(autoplayTimer);
        showToast("Auto-play off");
      }
    }

    function openPanel() {
      const list = document.getElementById("favList");
      if (favorites.size === 0) {
        list.innerHTML = `<p class="empty-fav">No favorites yet.<br>Heart a quote to save it here.</p>`;
      } else {
        list.innerHTML = [...favorites].map(key => {
          const q = QUOTES.find(x => x.text === key);
          return q ? `<div class="fav-item">"${q.text}"<small>— ${q.author}</small></div>` : "";
        }).join("");
      }
      document.getElementById("overlay").classList.add("open");
      document.getElementById("panel").classList.add("open");
    }

    function closePanel() {
      document.getElementById("overlay").classList.remove("open");
      document.getElementById("panel").classList.remove("open");
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
    }

    // Keyboard nav
    document.addEventListener("keydown", e => {
      if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); nextQuote(); }
      if (e.key === "ArrowLeft") prevQuote();
      if (e.key === "f" || e.key === "F") toggleLike();
      if (e.key === "Escape") closePanel();
    });

    // Init
    buildCategoryBar();
    showQuote(0);
  </script>
</body>
</html>
